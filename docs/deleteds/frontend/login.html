<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PLOC - Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="logo">PLOC</div>
        <p class="subtitle">Bem-vindo ao seu novo sócio de rotinas.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-premium">Entrar no Reino</button>
        </form>

        <div class="footer-links">
            Não tem uma conta? <a href="register.html">Começar agora</a>
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PLOC - O Seu Sócio</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json?v=0.0.4">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/app.css">
    <style>
        /* Escudo de Exclusividade / Em Construção */
        #desktop-block {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #020617 url('/ploc_under_construction.png') no-repeat center center;
            background-size: cover;
            z-index: 100000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 2rem;
        }

        /* Camada de escurecimento para ler o texto melhor */
        #desktop-block::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.7);
            z-index: -1;
        }

        /* @media (min-width: 481px) {
            #desktop-block { display: flex; }
            body { overflow: hidden; }
        } */

        .ploc-mini {
            width: 60px; height: 60px;
            background: linear-gradient(145deg, #f1f5f9, #cbd5e1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: breath 4s infinite ease-in-out;
        }
        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>

<body>
    <!-- Overlay de Em Construção -->
    <div id="desktop-block">
        <div class="ploc-mini">
            <div style="display: flex; gap: 6px;">
                <div style="width: 3px; height: 10px; background: #1e293b; border-radius: 10px;"></div>
                <div style="width: 3px; height: 10px; background: #1e293b; border-radius: 10px;"></div>
            </div>
        </div>
        <h1 style="font-weight: 800; letter-spacing: 10px; margin-bottom: 0.5rem; color: #fff;">PLOC</h1>
        <div style="width: 50px; height: 2px; background: #38bdf8; margin-bottom: 2rem;"></div>
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">VERSÃO WEB EM OBRAS</h2>
        <p style="color: #cbd5e1; font-size: 1rem; max-width: 450px; line-height: 1.6; font-weight: 300;">
            Estamos refinando a experiência do Ploc para telas maiores.<br>
            <span style="color: #38bdf8; font-weight: 600; font-size: 1.1rem;">Acesse pelo seu smartphone</span><br>
            para usar o seu sócio de produtividade agora mesmo.
        </p>
    </div>

    <div id="app"></div>

    <script>
        // Automação de Atualização Total - Motor v0.2.0 (Implacável)
        const APP_VERSION = 'v0.0.4';
        const currentVersion = localStorage.getItem('ploc_version');

        if (currentVersion && currentVersion !== APP_VERSION) {
            console.log('🚀 Nova versão detectada:', APP_VERSION);
            
            async function purgeAndReload() {
                try {
                    // 1. Limpa Cache Storage
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    console.log('✅ Caches deletados');

                    // 2. Mata Service Workers
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => reg.unregister()));
                    console.log('✅ Service Workers removidos');

                    // 3. Atualiza marcador e Reinicia
                    localStorage.setItem('ploc_version', APP_VERSION);
                    window.location.reload(true);
                } catch (err) {
                    console.error('Erro na atualização:', err);
                    localStorage.setItem('ploc_version', APP_VERSION);
                    window.location.reload(true);
                }
            }
            purgeAndReload();
        } else {
            localStorage.setItem('ploc_version', APP_VERSION);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=0.0.4')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
    <!-- Voltando para módulo para permitir o uso do apiClient -->
    <script type="module" src="app/main.js?v=0.0.4"></script>
</body>

</html>

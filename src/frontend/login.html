<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login PLOC | Acessar Sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: var(--text-muted); margin-bottom: 2rem; }

        .form-group { text-align: left; margin-bottom: 1.2rem; }

        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.8rem;
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        button:hover { background: var(--primary-hover); }

        .footer-link { margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }

        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }

        #message { margin-top: 1rem; font-size: 0.9rem; border-radius: 0.5rem; padding: 0.8rem; display: none; }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>PLOC</h1>
        <p>Acesse seu dashboard administrativo.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Entrar no Sistema</button>
        </form>

        <div id="message"></div>

        <div class="footer-link">
            Ainda não tem conta? <a href="register.html">Cadastre-se</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://backend.midializando.cloud/api/auth/login';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('message');
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // SALVAR TOKEN E DADOS DO USUÁRIO
                    localStorage.setItem('ploc_token', result.token);
                    localStorage.setItem('ploc_user', JSON.stringify(result.user));

                    messageDiv.className = 'success';
                    messageDiv.style.display = 'block';
                    messageDiv.innerText = "Login realizado! Redirecionando...";
                    
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    throw new Error(result.error || 'Falha no login');
                }
            } catch (error) {
                messageDiv.className = 'error';
                messageDiv.style.display = 'block';
                messageDiv.innerText = error.message;
            }
        });
    </script>
</body>
</html>

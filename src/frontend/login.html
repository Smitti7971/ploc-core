<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOC - Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #ffffff;
            --text: #1e293b;
            --border: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: var(--text);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        #message {
            margin-top: 20px;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        
        .error { background: #fee2e2; color: #b91c1c; }
        .success { background: #dcfce7; color: #15803d; }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">PLOC</div>
        <p class="subtitle">Bem-vindo ao seu novo sócio de rotinas.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Entrar no Reino</button>
        </form>

        <div id="message"></div>

        <div class="footer-links">
            Não tem uma conta? <a href="#">Começar agora</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://backend.midializando.cloud/api/auth/login';
        const messageDiv = document.getElementById('message');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));

                    messageDiv.className = 'success';
                    messageDiv.style.display = 'block';
                    messageDiv.innerText = "Login realizado! Preparando o PLOC...";
                    
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    throw new Error(result.error || 'Falha no login');
                }
            } catch (error) {
                messageDiv.className = 'error';
                messageDiv.style.display = 'block';
                messageDiv.innerText = error.message;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOC - Dashboard Kanban</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --sidebar-bg: #1e293b;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR RETROATIVA */
        .sidebar {
            position: fixed;
            left: -200px; /* Escondida */
            top: 0;
            width: 240px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        /* Gatilho invisível para abrir */
        .sidebar-trigger {
            position: fixed;
            left: 0;
            top: 0;
            width: 20px;
            height: 100%;
            z-index: 1001;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar {
            left: 0;
        }

        .sidebar h2 { color: white; margin-bottom: 30px; font-weight: 800; }
        .nav-link { color: #94a3b8; text-decoration: none; padding: 12px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }

        /* KANBAN ÁREA */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
        }

        header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.8rem; font-weight: 600; }

        .kanban-board {
            display: flex;
            gap: 20px;
            padding-bottom: 20px;
            flex: 1;
            align-items: flex-start;
        }

        .day-column {
            min-width: 300px;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 20px;
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .day-column h3 { margin-bottom: 20px; color: #64748b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .task-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px var(--shadow);
            margin-bottom: 15px;
            cursor: grab;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .task-card:hover { transform: scale(1.02); border-color: var(--primary); }
        .task-card:active { cursor: grabbing; }

        .task-card .tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; background: #e0e7ff; color: #4338ca; font-weight: 600; margin-bottom: 8px; display: inline-block; }
        .task-card p { font-size: 0.95rem; color: var(--text); line-height: 1.4; }

        /* Scroll Customizado */
        .main-content::-webkit-scrollbar { height: 8px; }
        .main-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar-trigger"></div>
    <aside class="sidebar">
        <h2>PLOC</h2>
        <a href="index.html" class="nav-link">🏠 Início (O Ploc)</a>
        <a href="#" class="nav-link">🗓️ Calendário</a>
        <a href="#" class="nav-link">⚙️ Configurações</a>
        <div style="margin-top: auto;">
            <a href="login.html" class="nav-link" onclick="logout()">🚪 Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1>Minhas Rotinas</h1>
            <div id="userGreeting">Olá, Smitti!</div>
        </header>

        <div class="kanban-board" id="kanbanBoard">
            <!-- COLUNAS DOS DIAS -->
            <div class="day-column" ondrop="drop(event)" ondragover="allowDrop(event)" data-day="monday">
                <h3>Segunda</h3>
                <div class="task-card" draggable="true" ondragstart="drag(event)" id="task-1">
                    <span class="tag">🌱 Plantas</span>
                    <p>Regar o Lírio da Paz (Manhã)</p>
                </div>
            </div>

            <div class="day-column" ondrop="drop(event)" ondragover="allowDrop(event)" data-day="tuesday">
                <h3>Terça</h3>
                <div class="task-card" draggable="true" ondragstart="drag(event)" id="task-2">
                    <span class="tag">🏠 Casa</span>
                    <p>Limpar filtros do ar</p>
                </div>
            </div>

            <div class="day-column" data-day="wednesday">
                <h3>Quarta</h3>
            </div>

            <div class="day-column" data-day="thursday">
                <h3>Quinta</h3>
            </div>

            <div class="day-column" data-day="friday">
                <h3>Sexta</h3>
            </div>
        </div>
    </main>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            var column = ev.target.closest('.day-column');
            if (column) {
                column.appendChild(document.getElementById(data));
                console.log('Tarefa movida para:', column.dataset.day);
                // Aqui depois faremos o fetch para o backend salvar a data
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

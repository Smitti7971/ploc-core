<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOC | Meu Sócio de Vida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <meta name="theme-color" content="#6366f1">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(51, 65, 85, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(192, 132, 252, 0.15) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text);
        }

        /* --- INPUT PRINCIPAL --- */
        .main-input-wrapper {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .main-input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            padding: 0.5rem;
            font-family: inherit;
        }

        .main-input-wrapper input:focus {
            outline: none;
        }

        .main-input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* --- CATEGORIAS --- */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 1rem;
        }

        .category-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .category-btn span {
            font-size: 1.2rem;
        }

        /* --- LISTA DE TAREFAS --- */
        .task-list {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox.checked {
            background: var(--primary);
        }

        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .task-content {
            flex: 1;
        }

        .task-name {
            font-weight: 400;
            font-size: 1rem;
        }

        .task-item.completed .task-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .delete-btn {
            opacity: 0;
            color: #f87171;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            transition: opacity 0.2s;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        /* --- UI HELPERS --- */
        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        #loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .category-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">PLOC</div>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </header>

        <!-- ENTRADA PRINCIPAL -->
        <div class="main-input-wrapper">
            <input type="text" id="taskInput" placeholder="me diga o que aconteceu..." onkeypress="handleKeyPress(event)">
            
            <div class="category-grid">
                <button class="category-btn" onclick="addTask('Saúde', '🩺')"><span>🩺</span>Saúde</button>
                <button class="category-btn" onclick="addTask('Finanças', '💰')"><span>💰</span>Finanças</button>
                <button class="category-btn" onclick="addTask('Trabalho', '💼')"><span>💼</span>Trabalho</button>
                <button class="category-btn" onclick="addTask('Leitura', '📚')"><span>📚</span>Leitura</button>
                <button class="category-btn" onclick="addTask('Hábito', '✨')"><span>✨</span>Hábito</button>
                <button class="category-btn" onclick="addTask('Meditação', '🧘')"><span>🧘</span>Mente</button>
            </div>
        </div>

        <!-- LISTA DE TAREFAS -->
        <div id="loading">Sincronizando rotinas... 🔄</div>
        <div class="task-list" id="taskList" style="display: none;">
            <!-- Tarefas via JS -->
        </div>
    </div>

    <script>
        const API_URL = 'https://backend.midializando.cloud/api/tasks';
        const token = localStorage.getItem('ploc_token');

        if (!token) window.location.href = 'login.html';

        function logout() {
            localStorage.removeItem('ploc_token');
            localStorage.removeItem('ploc_user');
            window.location.href = 'login.html';
        }

        async function fetchTasks() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) return logout();
                const tasks = await response.json();
                renderTasks(tasks);
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            const loading = document.getElementById('loading');
            
            list.innerHTML = '';
            loading.style.display = 'none';
            list.style.display = 'block';

            if (tasks.length === 0) {
                list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">Sua rotina está limpa. Comece agora! 🚀</div>';
                return;
            }

            tasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `task-item ${task.completed ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        <div class="task-name">${task.name}</div>
                        <div class="task-meta">${task.category} • ${new Date(task.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button>
                `;
                list.appendChild(item);
            });
        }

        async function addTask(category = 'Geral', emoji = '📝') {
            const input = document.getElementById('taskInput');
            const name = input.value || `Nova atividade de ${category}`;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name, category })
                });
                
                if (response.ok) {
                    input.value = '';
                    fetchTasks();
                }
            } catch (error) {
                alert('Erro ao salvar tarefa');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') addTask();
        }

        async function toggleTask(id) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchTasks();
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Remover esta tarefa?')) return;
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                fetchTasks();
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // Iniciar
        fetchTasks();
    </script>
</body>
</html>

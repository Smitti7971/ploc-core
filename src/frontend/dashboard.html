<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PLOC | Teste de Dados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            padding-left: 2.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.8rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            opacity: 0.6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            border-radius: 0.8rem;
            overflow: hidden;
        }

        th {
            background: var(--bg);
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            font-weight: 600;
        }

        #loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Ploc Database Test</h1>
            <button onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-family: inherit; font-weight: 600;">Sair</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Pesquisar por nome ou e-mail..." onkeyup="filterTable()">
            </div>
        </header>

        <div id="loading">Buscando dados no banco... 🚀</div>

        <div id="tableContainer" style="display: none;">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>NOME</th>
                        <th>E-MAIL</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <!-- Dados via JS -->
                </tbody>
            </table>
        </div>

        <div id="noResults" class="empty-state" style="display: none;">
            Nenhum usuário encontrado. 🧐
        </div>
    </div>

    <script>
        const API_URL = 'https://backend.midializando.cloud/api/users';
        let allUsers = [];

        // --- PROTEÇÃO DA PÁGINA ---
        const token = localStorage.getItem('ploc_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('ploc_token');
            localStorage.removeItem('ploc_user');
            window.location.href = 'login.html';
        }
        // --------------------------

        async function fetchUsers() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.status === 401) {
                    logout(); // Token expirado ou inválido
                    return;
                }

                if (!response.ok) throw new Error('Erro ao buscar dados');
                
                allUsers = await response.json();
                renderTable(allUsers);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ Falha ao conectar com a API: ' + error.message;
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                document.getElementById('tableContainer').style.display = 'none';
                document.getElementById('noResults').style.display = 'block';
                return;
            }

            document.getElementById('noResults').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';

            users.forEach(user => {
                const row = `
                    <tr>
                        <td>#${user.id}</td>
                        <td style="font-weight: 600;">${user.name}</td>
                        <td style="color: var(--text-muted);">${user.email}</td>
                        <td><span class="status-badge">Ativo</span></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.name.toLowerCase().includes(query) || 
                user.email.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        // Iniciar busca
        fetchUsers();
    </script>
</body>
</html>

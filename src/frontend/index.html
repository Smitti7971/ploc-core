<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PLOC - Mobile First</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/app.css">
    <style>
        /* Escudo de Exclusividade Mobile */
        #desktop-block {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            z-index: 100000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 2rem;
        }

        @media (min-width: 1025px) {
            #desktop-block { display: flex; }
            body { overflow: hidden; }
        }

        .ploc-mini {
            width: 80px; height: 80px;
            background: linear-gradient(145deg, #f1f5f9, #cbd5e1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: breath 4s infinite ease-in-out;
        }
        @keyframes breath {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>

<body>
    <!-- Overlay para Desktop -->
    <div id="desktop-block">
        <div class="ploc-mini">
            <div style="display: flex; gap: 8px;">
                <div style="width: 4px; height: 12px; background: #1e293b; border-radius: 10px;"></div>
                <div style="width: 4px; height: 12px; background: #1e293b; border-radius: 10px;"></div>
            </div>
        </div>
        <h1 style="font-weight: 800; letter-spacing: 5px; margin-bottom: 1rem;">PLOC</h1>
        <p style="color: #64748b; font-size: 1.1rem; max-width: 400px; line-height: 1.6;">
            O Ploc foi desenhado para viver no seu bolso.<br>
            <span style="color: #38bdf8; font-weight: 600;">Acesse pelo celular</span> para a experiência completa.
        </p>
    </div>

    <div id="app"></div>

    <script>
        // Força a limpeza de caches antigos se a versão mudar
        const APP_VERSION = 'v14';
        if (localStorage.getItem('ploc_version') !== APP_VERSION) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
            });
            localStorage.setItem('ploc_version', APP_VERSION);
            console.log('Cache Purged for Version', APP_VERSION);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=14')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
    <!-- Voltando para módulo para permitir o uso do apiClient -->
    <script type="module" src="/js/main.js"></script>
</body>

</html>

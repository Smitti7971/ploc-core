<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLOC - O Seu Sócio</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #ffffff;
            --text: #1e293b;
            --shadow: rgba(0,0,0,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text);
        }

        /* O PLOC - Esfera Central */
        .ploc-sphere {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #6366f1, #4338ca);
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(99, 102, 241, 0.3),
                        inset -10px -10px 30px rgba(0,0,0,0.2),
                        inset 10px 10px 30px rgba(255,255,255,0.2);
            margin-bottom: 40px;
            animation: float 4s ease-in-out infinite;
            cursor: pointer;
            position: relative;
        }

        /* Olhinhos sutis do Ploc */
        .ploc-sphere::after, .ploc-sphere::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 40%;
            animation: blink 5s infinite;
        }
        .ploc-sphere::before { left: 35%; }
        .ploc-sphere::after { right: 35%; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        /* Input de Texto */
        .input-container {
            width: 90%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .main-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            background: #f8fafc;
            text-align: center;
        }

        .main-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.1);
        }

        /* Grade de Botões */
        .routine-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .btn-routine {
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #f8fafc;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border: 1px solid #f1f5f9;
        }

        .btn-routine:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        .btn-dash {
            grid-column: span 2;
            background: #1e293b;
            color: white;
        }

        /* Branding sutil */
        .logo-text {
            position: absolute;
            top: 40px;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        /* SIDEBAR PREMIUM (GLASS) */
        .sidebar {
            position: fixed;
            left: -220px;
            top: 0;
            width: 260px;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 15px 0 50px rgba(0,0,0,0.15);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-trigger {
            position: fixed;
            left: 0;
            top: 0;
            width: 15px;
            height: 100%;
            z-index: 1001;
        }

        .sidebar:hover, .sidebar-trigger:hover + .sidebar {
            left: 0;
        }

        .sidebar h2 { 
            color: white; 
            margin-bottom: 40px; 
            font-weight: 800; 
            font-family: 'Outfit', sans-serif;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar h2::before {
            content: '';
            width: 12px;
            height: 12px;
            background: #6366f1;
            border-radius: 50%;
            display: inline-block;
        }

        .nav-link { 
            color: #94a3b8; 
            text-decoration: none; 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            transition: 0.3s; 
            font-weight: 400;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-link:hover { 
            background: rgba(255,255,255,0.08); 
            color: white; 
            transform: translateX(5px);
        }

        .nav-link.active {
            background: #6366f1;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sidebar-trigger"></div>
    <aside class="sidebar">
        <h2>PLOC</h2>
        <nav>
            <a href="index.html" class="nav-link active"><span>🏠</span> Início</a>
            <a href="dashboard.html" class="nav-link"><span>🗓️</span> Calendário</a>
            <a href="#" class="nav-link"><span>💡</span> Ideias</a>
            <a href="#" class="nav-link"><span>⚙️</span> Ajustes</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="login.html" class="nav-link" onclick="localStorage.clear()"><span>🚪</span> Sair</a>
        </div>
    </aside>

    <div class="logo-text">PLOC</div>

    <div class="ploc-sphere" id="plocMascot"></div>

    <div class="input-container">
        <input type="text" class="main-input" placeholder="O que aconteceu agora?" id="userInput">
    </div>

    <div class="routine-grid">
        <a href="dashboard.html" class="btn-routine btn-dash">🚀 Ir para o Dashboard</a>
        <button class="btn-routine">🍏 Saúde</button>
        <button class="btn-routine">💰 Finanças</button>
        <button class="btn-routine">📖 Leitura</button>
        <button class="btn-routine">🎯 Trabalho</button>
    </div>

    <script>
        // Verificação de Autenticação
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Futura lógica de voz e interação
        document.getElementById('plocMascot').onclick = () => {
            alert('PLOC: Estou te ouvindo, parceiro!');
        }
    </script>
</body>
</html>

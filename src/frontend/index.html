<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLOC - Mobile First</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/app.css">
    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <div id="app"></div>

    <script>
        // Força a limpeza de caches antigos se a versão mudar
        const APP_VERSION = 'v14';
        if (localStorage.getItem('ploc_version') !== APP_VERSION) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) registration.unregister();
            });
            localStorage.setItem('ploc_version', APP_VERSION);
            console.log('Cache Purged for Version', APP_VERSION);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=14')
                .then(() => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
    <!-- Voltando para módulo para permitir o uso do apiClient -->
    <script type="module" src="/js/main.js"></script>
</body>

</html>

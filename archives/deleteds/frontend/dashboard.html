<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PLOC - Dashboard Kanban</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Nova Tarefa</h2>
            <input type="text" id="taskTitle" placeholder="O que vamos fazer?">
            <div style="display: flex; gap: 0.625rem;">
                <input type="time" id="taskTime">
                <select id="taskCategory">
                    <option value="cat-plant">🌱 Planta</option>
                    <option value="cat-work">💼 Trabalho</option>
                    <option value="cat-home">🏠 Casa</option>
                </select>
            </div>
            <textarea id="taskDesc" placeholder="Detalhes (opcional)" rows="3"></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save">Salvar Tarefa</button>
            </div>
        </div>
    </div>

    <div class="sidebar-trigger"></div>
    <aside class="sidebar">
        <h2>PLOC</h2>
        <nav>
            <a href="index.html" class="nav-link"><span>🏠</span> Início</a>
            <a href="#" class="nav-link active"><span>🗓️</span> Calendário</a>
            <a href="#" class="nav-link"><span>💡</span> Ideias</a>
            <a href="#" class="nav-link" onclick="generateChaos(30)" style="color: #f59e0b; font-weight: 700;"><span>💣</span> Modo Caos</a>
            <a href="#" class="nav-link"><span>⚙️</span> Ajustes</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="#" class="nav-link" onclick="logout()"><span>🚪</span> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div>
                <span>Seu sócio diz:</span>
                <h1>Dia de florescer.</h1>
            </div>
            <div id="userGreeting">Smitti • Hoje</div>
        </header>

        <div class="kanban-board" id="kanbanBoard">
            <!-- COLUNAS GERADAS PELO JS -->
        </div>
    </main>

    <!-- Core Logic -->
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PLOC - Criar Conta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

    <link rel="stylesheet" href="css/register.css">
</head>
<body>

    <div class="login-card">
        <h1>Criar Conta</h1>
        <p>Comece sua jornada no PLOC hoje.</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="name" placeholder="Como quer ser chamado?" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Sua Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-premium">Criar Minha Conta</button>
        </form>

        <div class="footer-links">
            Já tem uma conta? <a href="login.html">Entrar no Reino</a>
        </div>
    </div>

    <!-- Logic -->
    <script type="module" src="js/register.js"></script>
</body>
</html>
